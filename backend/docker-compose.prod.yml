# INSPECTA BUILDOS — production stack (server deployment).
# Postgres stays internal to the compose network; the API is published only on
# 127.0.0.1:5010 so the CloudPanel/nginx reverse proxy (api-inspecta.isiri.rw)
# can reach it. Secrets come from a local .env file (never committed).
#
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: inspecta-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inspecta_buildos}
    volumes:
      - inspecta_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inspecta_buildos}']
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inspecta-prod-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://inspecta.isiri.rw}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-inspecta_buildos}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set in .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-documents}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@inspecta.ai}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
    ports:
      - '127.0.0.1:5010:4000'

volumes:
  inspecta_prod_pgdata:
