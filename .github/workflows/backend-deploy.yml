name: Backend CI/CD

# Runs only when backend code (or this workflow) changes.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx jest --ci --passWithNoTests

  deploy:
    name: Deploy to server
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package backend (no node_modules)
        run: tar czf /tmp/backend.tgz -C backend --exclude=node_modules --exclude=dist --exclude=.env .

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Runtime credentials live in GitHub secrets, not in the repo. This syncs
      # them into the server .env before compose restarts, so a rebuilt server
      # (or a wiped .env) recovers its configuration automatically instead of
      # needing someone to remember a manual step.
      # No-ops when the secret is unset, so it can never blank out a value that
      # was configured by hand.
      - name: Sync storage credentials into the server .env
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: 176.126.87.142
          USER: root
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_FOLDER: ${{ secrets.CLOUDINARY_FOLDER }}
        run: |
          if [ -z "$CLOUDINARY_CLOUD_NAME" ] || [ -z "$CLOUDINARY_API_KEY" ] || [ -z "$CLOUDINARY_API_SECRET" ]; then
            echo "ℹ️  Cloudinary secrets not set in this repo — leaving the server .env untouched."
            echo "    File uploads stay disabled until they are configured; attaching links still works."
            exit 0
          fi
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          # Replace rather than append, so re-running never duplicates keys.
          sshpass -e ssh $OPTS "$USER@$HOST" "
            set -e
            cd /home/inspectaapi/app
            touch .env
            sed -i '/^CLOUDINARY_/d' .env
            {
              echo 'CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME'
              echo 'CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY'
              echo 'CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET'
              echo 'CLOUDINARY_FOLDER=${CLOUDINARY_FOLDER:-inspecta}'
            } >> .env
          "
          echo "✅ storage credentials synced (values come from repo secrets, never the repo)"

      - name: Ship & redeploy (exec channel; SFTP is disabled on host)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: 176.126.87.142
          USER: root
        run: |
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          sshpass -e ssh $OPTS "$USER@$HOST" "mkdir -p /home/inspectaapi/app"
          sshpass -e ssh $OPTS "$USER@$HOST" "cat > /tmp/backend.tgz" < /tmp/backend.tgz
          # Stamp the deployed commit SHA into .env so compose injects it at runtime.
          sshpass -e ssh $OPTS "$USER@$HOST" "cd /home/inspectaapi/app && touch .env && sed -i '/^BUILD_VERSION=/d' .env && echo 'BUILD_VERSION=${{ github.sha }}' >> .env"
          sshpass -e ssh $OPTS "$USER@$HOST" '
            set -e
            cd /home/inspectaapi/app
            find . -maxdepth 1 -mindepth 1 ! -name .env -exec rm -rf {} +
            tar xzf /tmp/backend.tgz -C .
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f >/dev/null 2>&1 || true
          '

      - name: Health check (retry until the API is listening)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: 176.126.87.142
          USER: root
        run: |
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          # The container runs prisma db push + seed before Node listens, so the
          # port can accept-then-reset for ~15s. Poll for up to ~2 minutes.
          for i in $(seq 1 24); do
            if sshpass -e ssh $OPTS "$USER@$HOST" 'curl -fsS -m 5 http://127.0.0.1:5010/api/health' ; then
              echo ""
              echo "✅ backend healthy after $((i*5))s"
              exit 0
            fi
            echo "waiting for backend to come up... (attempt $i)"
            sleep 5
          done
          echo "❌ backend did not become healthy in time; recent logs:"
          sshpass -e ssh $OPTS "$USER@$HOST" 'docker logs --tail 30 inspecta-prod-backend 2>&1' || true
          exit 1
